








{% extends 'base.html' %}

{% block content %}


    <style>
        body {
            background: #0b0b0b;
            color: white;
        }

        .card-dark {
            background: #111;
            border-radius: 12px;
            padding: 12px;
        }

        .video-row {
            cursor: pointer;
        }
    </style>


<div class="container-fluid p-4">

    <h3 class="mb-4">🎬 Videos</h3>

    <!-- Search -->
    <div class="mb-4">
        <input id="searchInput" class="form-control" placeholder="Search videos...">
    </div>

    <div class="row">

        <!-- LEFT -->
        <div class="col-lg-8">
            <div id="videoList" class="row g-3"></div>
        </div>

        <!-- RIGHT -->
        <div class="col-lg-4">
            <div class="card-dark">

                <div id="emptyState">
                    <p>Select a video</p>
                </div>

                <div id="videoDetails" style="display:none;">

                    <video id="detailVideo" controls class="w-100 mb-3"></video>
                    <img id="detailThumb" class="w-100 mb-3" style="display:none;">

                    <h5 id="detailTitle"></h5>
                    <p id="detailDesc" class="text-muted"></p>

                    <div class="d-flex gap-3 mb-3">
                        <span id="detailViews"></span>
                        <span id="detailLikes"></span>
                        <span id="detailDownloads"></span>
                    </div>

                    <button class="btn btn-success w-100 mb-2" id="copyBtn">Copy Link</button>
                    <button class="btn btn-danger w-100" id="deleteBtn">Delete</button>

                </div>

            </div>
        </div>

    </div>
</div>

<script>
const API = "https://tubeboxservers-production.up.railway.app/api/admin/videos";

function getToken() {
    return localStorage.getItem("token");
}

async function loadVideos() {
    try {
        console.log("Fetching videos...");

        const res = await fetch(API, {
            headers: {
                "Authorization": "Bearer " + getToken()
            }
        });

        if (!res.ok) throw new Error("API failed");

        const videos = await res.json();
        renderVideos(videos);

    } catch (err) {
        console.error(err);
        document.getElementById("videoList").innerHTML =
            "<p style='color:red'>Failed to load videos</p>";
    }
}

function renderVideos(videos) {
    const container = document.getElementById("videoList");
    container.innerHTML = "";

    videos.forEach(v => {
        container.innerHTML += `
        <div class="col-12">
            <div class="card-dark video-row" onclick="loadVideo('${v.id}')">

                <div class="row align-items-center">

                    <div class="col-3">
                        <img src="${v.thumbnail_url || 'https://placehold.co/300'}"
                             class="w-100 rounded">
                    </div>

                    <div class="col-7">
                        <h6>${v.title}</h6>
                        <small>${v.description || ''}</small>
                    </div>

                    <div class="col-2 text-end">
                        <button class="btn btn-sm btn-success">Open</button>
                    </div>

                </div>

            </div>
        </div>
        `;
    });
}

async function loadVideo(id) {
    try {
        const res = await fetch(API + "/" + id, {
            headers: {
                "Authorization": "Bearer " + getToken()
            }
        });

        const v = await res.json();

        document.getElementById("emptyState").style.display = "none";
        document.getElementById("videoDetails").style.display = "block";

        const video = document.getElementById("detailVideo");
        const thumb = document.getElementById("detailThumb");

        if (v.video_url) {
            video.style.display = "block";
            thumb.style.display = "none";
            video.src = v.video_url;
        } else {
            video.style.display = "none";
            thumb.style.display = "block";
            thumb.src = v.thumbnail_url;
        }

        document.getElementById("detailTitle").innerText = v.title;
        document.getElementById("detailDesc").innerText = v.description;
        document.getElementById("detailViews").innerText = "👁 " + (v.views || 0);
        document.getElementById("detailLikes").innerText = "❤️ " + (v.likes || 0);
        document.getElementById("detailDownloads").innerText = "⬇ " + (v.downloads || 0);

        document.getElementById("copyBtn").onclick = () => {
            navigator.clipboard.writeText("https://tubebox.in/" + v.id);
            alert("Copied!");
        };

        document.getElementById("deleteBtn").onclick = () => deleteVideo(v.id);

    } catch (err) {
        alert("Failed to load video");
    }
}

async function deleteVideo(id) {
    if (!confirm("Delete video?")) return;

    try {
        const res = await fetch(API + "/" + id, {
            method: "DELETE",
            headers: {
                "Authorization": "Bearer " + getToken()
            }
        });

        if (res.ok) {
            alert("Deleted");
            loadVideos();
        } else {
            alert("Delete failed");
        }

    } catch {
        alert("Server error");
    }
}

document.getElementById("searchInput").addEventListener("keyup", function () {
    const value = this.value.toLowerCase();
    document.querySelectorAll(".video-row").forEach(el => {
        el.style.display = el.innerText.toLowerCase().includes(value) ? "block" : "none";
    });
});

loadVideos();
</script>

{% endblock %}
