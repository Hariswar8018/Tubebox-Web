{% extends 'base.html' %}

{% block content %}
<h3>All Videos</h3>

<div class="row">
    {% for video in videos %}
    <div class="col-md-4 mt-3">
        <div class="card">
            <video controls width="100%">
                <source src="{{ url_for('static', filename='uploads/' + video.file) }}">
            </video>
            <div class="card-body">
                <h5>{{ video.title }}</h5>
                <p>{{ video.description }}</p>
            </div>
        </div>
    </div>
    {% endfor %}
</div>

{% endblock %}
