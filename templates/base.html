<!DOCTYPE html>
<html>
<head>
    <title>Admin Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
<div class="d-flex">

    <!-- Sidebar -->
    <div class="bg-dark text-white p-3" style="width: 250px; height: 100vh;">
        <h4>Admin Panel</h4>
        <hr>
        <ul class="nav flex-column">
            <li class="nav-item">
                <a href="/upload" class="nav-link text-white">Upload Video</a>
            </li>
            <li class="nav-item">
                <a href="/videos" class="nav-link text-white">All Videos</a>
            </li>
            <li class="nav-item">
                <a href="/telegram" class="nav-link text-white">Telegram Bot</a>
            </li>
        </ul>
    </div>

    <!-- Main Content -->
    <div class="p-4 w-100">
        {% block content %}{% endblock %}
    </div>

</div>
</body>
</html>
