<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome Icons -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static',filename='css/style.css') }}">
</head>

<body>

<!-- TOP HEADER -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark border-bottom border-secondary px-4">
    
    <!-- Left Logo -->
    <a class="navbar-brand fw-bold fs-4" href="/">
        <i class="fa-solid fa-play-circle me-2 text-success"></i>Tubebox
    </a>

    <!-- Right Menu -->
    <div class="ms-auto d-flex align-items-center gap-3">

        <a href="/videos" class="text-white text-decoration-none small">
            <i class="fa-solid fa-gauge-high me-1"></i>Dashboard
        </a>

        <div class="vr text-white"></div>

        <a href="/telegram" class="text-white text-decoration-none small">
            <i class="fa-brands fa-telegram me-1"></i>Telegram
        </a>

        <div class="vr text-white"></div>

        <a href="/analytics" class="text-white text-decoration-none small">
            <i class="fa-solid fa-chart-line me-1"></i>Analytics
        </a>

        <div class="vr text-white"></div>

        <a href="/ads" class="text-white text-decoration-none small">
            <i class="fa-solid fa-bullhorn me-1"></i>Ads
        </a>

        <div class="vr text-white"></div>

        <a href="/logout" class="btn btn-sm btn-danger px-3">
            <i class="fa-solid fa-right-from-bracket me-1"></i>Logout
        </a>

    </div>
</nav>


<div class="d-flex">

    <!-- SIDEBAR -->
    <div class="bg-dark text-white p-3 border-end border-secondary"
         style="width:250px; min-height:100vh;">


        <ul class="nav flex-column">

            <li class="nav-item py-2 border-bottom border-secondary">
                <a href="/upload" class="nav-link text-white px-0">
                    <i class="fa-solid fa-cloud-arrow-up me-2 text-success"></i>
                    Upload Video
                </a>
            </li>

            <li class="nav-item py-2 border-bottom border-secondary">
                <a href="/videos" class="nav-link text-white px-0">
                    <i class="fa-solid fa-film me-2 text-primary"></i>
                    All Videos
                </a>
            </li>

            <li class="nav-item py-2 border-bottom border-secondary">
                <a href="/telegram" class="nav-link text-white px-0">
                    <i class="fa-brands fa-telegram me-2 text-info"></i>
                    Telegram Bot
                </a>
            </li>

            <li class="nav-item py-2 border-bottom border-secondary">
                <a href="/analytics" class="nav-link text-white px-0">
                    <i class="fa-solid fa-chart-line me-2 text-warning"></i>
                    Analytics
                </a>
            </li>

            <li class="nav-item py-2 border-bottom border-secondary">
                <a href="/ads" class="nav-link text-white px-0">
                    <i class="fa-solid fa-bullhorn me-2 text-danger"></i>
                    Ads
                </a>
            </li>

            <li class="nav-item py-2">
                <a href="/logout" class="nav-link text-white px-0">
                    <i class="fa-solid fa-right-from-bracket me-2 text-light"></i>
                    Logout
                </a>
            </li>

        </ul>
    </div>

    <!-- MAIN CONTENT -->
    <div class="p-4 w-100">
        {% block content %}{% endblock %}
    </div>

</div>

</body>
</html>
